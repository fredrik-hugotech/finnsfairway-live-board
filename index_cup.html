<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finns Fairway Cup – Live kampoversikt</title>
  <style>
    /* Fargevariabler og grunnleggende stiler */
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --brand: #203864;
      --line: #e5e7eb;
      --radius: 16px;
      /* Statusfarger for liveprogrammet */
      --upcoming: #e7f4e4; /* grønn for kommende kamper */
      --next: #fff4cc;    /* gul for neste runde (nærmeste kommende kamper) */
      --done: #fbeaea;    /* rød for ferdigspilte kamper */
      --live: #fff9e6;    /* lys gul for pågående kamper */
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .hero {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: var(--brand);
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1.2fr .9fr .9fr;
      gap: 12px;
      margin: 16px 0;
    }
    .control {
      background: var(--card);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.05);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .board {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    .table-wrap {
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed; /* slik at kolonnebreddene håndteres bedre */
    }
    thead th {
      background: var(--brand);
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
      word-break: break-word;
    }
    /* Farg bakgrunn etter statusklasser */
    tbody tr.done     { background: var(--done); }
    tbody tr.next     { background: var(--next); }
    tbody tr.upcoming { background: var(--upcoming); }
    tbody tr.live     { background: var(--live); }

    .status {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,.65);
    }
    .match {
      font-weight: 700;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .footer {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
      text-align: right;
    }
    .count {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }
    /* Mobiltilpasning */
    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Finns Fairway Cup – Live kampoversikt</h1>
      <div class="meta">Oppdaterer automatisk hvert minutt.</div>
    </section>

    <section class="controls">
      <div class="control">
        <label for="search">Søk etter lag eller klubb</label>
        <input id="search" type="text" placeholder="Søk i hjemmelag, bortelag eller kamp">
      </div>
      <div class="control">
        <label for="day">Dag</label>
        <select id="day">
          <option value="">Alle dager</option>
        </select>
      </div>
      <div class="control">
        <label for="field">Bane</label>
        <select id="field">
          <option value="">Alle baner</option>
        </select>
      </div>
    </section>

    <section class="board">
      <div class="count" id="count"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>D/T</th>
              <th>Tid</th>
              <th>Bane</th>
              <th>Kamp</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    <div class="footer" id="updated"></div>
  </div>

  <script>
    /*
      Sett inn den fulle matches-arrayen din her. Hver kamp må ha:
      {day, date, dateLabel, start, end, field, home, away, match}
    */
    const matches = [];

    const searchInput = document.getElementById("search");
    const daySelect = document.getElementById("day");
    const fieldSelect = document.getElementById("field");
    const tbody = document.getElementById("tbody");
    const countEl = document.getElementById("count");
    const updated = document.getElementById("updated");

    function unique(values) {
      return [...new Set(values)].sort((a, b) => a.localeCompare(b, "no"));
    }
    function fillSelect(select, values) {
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    function getStatus(match) {
      const now = new Date();
      const start = new Date(match.date + "T" + match.start + ":00");
      const end = new Date(match.date + "T" + match.end + ":00");
      if (now > end) return "done";
      if (now >= start) return "live";
      return "coming";
    }
    function getStatusLabel(status) {
      if (status === "done") return "Ferdig";
      if (status === "live") return "Pågår";
      return "Kommer";
    }

    function initFilters() {
      fillSelect(daySelect, unique(matches.map(m => m.day)));
      fillSelect(fieldSelect, unique(matches.map(m => m.field)));
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const day = daySelect.value;
      const field = fieldSelect.value;

      // Filtrering
      let filtered = matches.filter(m => {
        const text = (m.home + " " + m.away + " " + m.match).toLowerCase();
        const searchOk = !q || text.includes(q);
        const dayOk = !day || m.day === day;
        const fieldOk = !field || m.field === field;
        return searchOk && dayOk && fieldOk;
      });

      // Finn tidligste kommende kamp (neste runde)
      const upcomingTimes = filtered
        .filter(m => getStatus(m) === "coming")
        .map(m => new Date(m.date + "T" + m.start + ":00").getTime());
      const nextTime = upcomingTimes.length ? Math.min(...upcomingTimes) : null;

      // Sorter: live først, deretter kommende, til slutt ferdige; sorter innen status på starttid
      filtered.sort((a, b) => {
        const order = { live: 0, coming: 1, done: 2 };
        const sa = getStatus(a);
        const sb = getStatus(b);
        if (order[sa] !== order[sb]) return order[sa] - order[sb];
        const ta = new Date(a.date + "T" + a.start + ":00").getTime();
        const tb = new Date(b.date + "T" + b.start + ":00").getTime();
        return ta - tb;
      });

      // Render tabell
      tbody.innerHTML = "";
      filtered.forEach(m => {
        const status = getStatus(m);
        const tr = document.createElement("tr");
        // Sett klasse for radden basert på status og om det er neste kamp
        if (status === "done") {
          tr.className = "done";
        } else if (status === "coming" && nextTime && new Date(m.date + "T" + m.start + ":00").getTime() === nextTime) {
          tr.className = "next";
        } else if (status === "coming") {
          tr.className = "upcoming";
        } else if (status === "live") {
          tr.className = "live";
        }
        // Lag kort etikett for dag/dato (tre bokstaver + dato MM.DD)
        const dayShort = (m.day.split(" ")[0] || "").slice(0,3);
        const dateShort = m.dateLabel.slice(0,5);
        const dtLabel = `${dayShort} ${dateShort}`;
        tr.innerHTML = `
          <td>${dtLabel}</td>
          <td>${m.start}</td>
          <td>${m.field}</td>
          <td><div class="match">${m.home} – ${m.away}</div></td>
          <td><span class="status">${getStatusLabel(status)}</span></td>
        `;
        tbody.appendChild(tr);
      });

      countEl.textContent = `${filtered.length} kamper vist`;
      updated.textContent = "Sist oppdatert visning: " + new Date().toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
    }

    searchInput.addEventListener("input", render);
    daySelect.addEventListener("change", render);
    fieldSelect.addEventListener("change", render);

    // Initialisering
    initFilters();
    render();
    // Oppdater tabellen hvert minutt
    setInterval(render, 60000);
  </script>
</body>
</html>
