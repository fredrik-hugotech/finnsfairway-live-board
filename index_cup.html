<html lang="no">
<head>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --brand: #203864;
      --line: #e5e7eb;
      --coming: #e7f4e4;
      --live: #fff4cc;
      --done: #ececec;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .hero {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: var(--brand);
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1.2fr .9fr .9fr;
      gap: 12px;
      margin: 16px 0;
    }
    .control {
      background: var(--card);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.05);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .board {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    .table-wrap {
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: var(--brand);
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
    }
    tbody tr.coming { background: var(--coming); }
    tbody tr.live { background: var(--live); }
    tbody tr.done { background: var(--done); }
    .status {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,.65);
    }
    .match {
      font-weight: 700;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .footer {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
      text-align: right;
    }
    .count {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }
    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 24px;
      }
      thead th:nth-child(1),
      tbody td:nth-child(1) {
        min-width: 100px;
      }
    }
  </style>
</head>

    const searchInput = document.getElementById("search");
    const daySelect = document.getElementById("day");
    const fieldSelect = document.getElementById("field");
    const tbody = document.getElementById("tbody");
    const count = document.getElementById("count");
    const updated = document.getElementById("updated");

    function unique(values) {
      return [...new Set(values)].sort((a, b) => a.localeCompare(b, "no"));
    }

    function fillSelect(select, values) {
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    fillSelect(daySelect, unique(matches.map(m => m.day)));
    fillSelect(fieldSelect, unique(matches.map(m => m.field)));

    function getStatus(match) {
      const now = new Date();
      const start = new Date(match.date + "T" + match.start + ":00");
      const end = new Date(match.date + "T" + match.end + ":00");

      if (now > end) return "done";
      if (now >= start) return "live";
      return "coming";
    }

    function getStatusLabel(status) {
      if (status === "done") return "Ferdig";
      if (status === "live") return "Pågår";
      return "Kommer";
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const day = daySelect.value;
      const field = fieldSelect.value;

      const filtered = matches.filter(m => {
        const text = (m.home + " " + m.away + " " + m.match).toLowerCase();
        const searchOk = !q || text.includes(q);
        const dayOk = !day || m.day === day;
        const fieldOk = !field || m.field === field;
        return searchOk && dayOk && fieldOk;
      });

      tbody.innerHTML = "";

      filtered.forEach(m => {
        const status = getStatus(m);
        const tr = document.createElement("tr");
        tr.className = status;

        tr.innerHTML = 
          <td>${${(m.day.split(" ")[0]||"").slice(0,3)} ${m.dateLabel.slice(0,5)}}</td>
          <td>${m.start}</td>
          <td>${m.field}</td>
          <td>
            <div class="match">${m.home} – ${m.away}</div>
            <div class="sub">${m.day}</div>
          </td>
          <td><span class="status">${getStatusLabel(status)}</span></td>
        ;

        tbody.appendChild(tr);
      });

      count.textContent = ${filtered.length} kamper vist;
      updated.textContent = "Sist oppdatert visning: " + new Date().toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
    }

    searchInput.addEventListener("input", render);
    daySelect.addEventListener("change", render);
    fieldSelect.addEventListener("change", render);
