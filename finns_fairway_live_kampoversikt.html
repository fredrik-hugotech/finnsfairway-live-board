  <style>
    :root {

      --brand-2: #2f4f87;
      --line: #e5e7eb;
      --done: #fbe4e6;      /* rød */
      --next: #fff4cc;      /* gul */
      --coming: #e7f4e4;    /* grønn */
      --radius: 18px;
      --shadow: 0 10px 28px rgba(0,0,0,.07);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

      font-family: Arial, Helvetica, sans-serif;

      color: var(--text);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .hero {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff;
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }
    .meta {
      font-size: 14px;
      opacity: .92;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.16);
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
    }
    .dot.red { background: #f2a5ad; }
    .dot.yellow { background: #f6da76; }
    .dot.green { background: #9dd6a2; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      padding-top: 10px;
      background: linear-gradient(to bottom, var(--bg) 75%, rgba(244,247,251,0));
    }
    .controls {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr auto auto;
      gap: 12px;
      margin: 0 0 16px;
    }
    .control {
      background: var(--card);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    button {
      cursor: pointer;
      font-weight: 700;
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    button.secondary {
      background: #fff;
      color: var(--brand);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: 6px;
    }
    .stat .value {
      font-size: 22px;
      font-weight: 700;
    }
    .stat .sub {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .board {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .count {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .table-wrap {
      overflow: auto;
      max-height: 72vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: var(--brand);
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
    }
    tbody tr.coming { background: var(--coming); }
    tbody tr.next { background: var(--next); }
    tbody tr.done { background: var(--done); }
    tbody tr.focus-target {
      outline: 3px solid rgba(32,56,100,.15);
      outline-offset: -3px;
    }
    .status {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,.7);
      white-space: nowrap;
    }
    .match {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtext {
      color: var(--muted);
      font-size: 12px;
    }
    .footer {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
      text-align: right;
    }
    .empty {
      padding: 28px 18px;
      color: var(--muted);
    }
    @media (max-width: 980px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }

      thead th:nth-child(4),
      tbody td:nth-child(4) { min-width: 240px; }
    }

  <div class="wrap">
    <section class="hero">
      <h1>Finns Fairway Cup – Live kampoversikt</h1>
     
      <div class="legend">
        <span class="pill"><span class="dot red"></span> Ferdigspilt</span>
        <span class="pill"><span class="dot yellow"></span> Neste runde / spilles nå</span>
        <span class="pill"><span class="dot green"></span> Kommende kamper</span>
      </div>
    </section>

    <div class="topbar">
      <section class="controls">
        <div class="control">
          <label for="search">Søk etter lag eller klubb</label>
          <input id="search" type="text" placeholder="Søk i hjemmelag, bortelag eller kamp">

        <div class="control">
          <label for="day">Dag</label>
          <select id="day">

          </select>
        </div>
        <div class="control">
          <label for="field">Bane</label>
          <select id="field">
            <option value="">Alle baner</option>
          </select>
        </div>
        <div class="control">
          <label>&nbsp;</label>
          <button id="jumpBtn" type="button">Hopp til aktuell runde</button>
        </div>
        <div class="control">
          <label>&nbsp;</label>
          <button id="resetBtn" class="secondary" type="button">Nullstill filter</button>
        </div>
      </section>

      <section class="summary">
        <div class="stat">
          <div class="label">Viste kamper</div>
          <div class="value" id="shownCount">0</div>
          <div class="sub" id="totalCount">av 0 kamper</div>
        </div>
        <div class="stat">
          <div class="label">Aktuell runde</div>
          <div class="value" id="currentRound">–</div>
          <div class="sub" id="currentRoundSub">Venter på neste kamp</div>

        <div class="stat">
          <div class="label">Nå</div>
          <div class="value" id="clockNow">–</div>
          <div class="sub" id="clockDate">–</div>
        </div>
        <div class="stat">
          <div class="label">Sist oppdatert</div>
          <div class="value" id="updatedAt">–</div>
          <div class="sub">Auto-oppdatering hvert 30. sekund</div>
        </div>
      </section>
    </div>

    <section class="board">
      <div class="count">
        <div id="countText"></div>
        <div id="liveNote"></div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Dato</th>
              <th>Tid</th>
              <th>Bane</th>
              <th>Kamp</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="emptyState" hidden>Ingen kamper matcher filtrene dine.</div>
      </div>
    </section>

    <div class="footer" id="footerText"></div>
  </div>

-15", "dateLabel": "15.03.2026", "start": "15:40", "end": "15:58", "field": "Bane 3", "home": "Vindbjart G2016 - 1", "away": "Gimletroll G2016 - 7", "match": "Vindbjart G2016 - 1 – Gimletroll G2016 - 7"}, {"day": "Søndag", "date": "2026-03-15", "dateLabel": "15.03.2026", "start": "15:40", "end": "15:58", "field": "Bane 4", "home": "Vindbjart G2016 - 2", "away": "Lia G2016", "match": "Vindbjart G2016 - 2 – Lia G2016"}, {"day": "Søndag", "date": "2026-03-15", "dateLabel": "15.03.2026", "start": "15:40", "end": "15:58", "field": "Bane 5", "home": "Søgne G2016 - 2", "away": "Hisøy G2016 - 2", "match": "Søgne G2016 - 2 – Hisøy G2016 - 2"}];

    const searchEl = document.getElementById('search');
    const dayEl = document.getElementById('day');
    const fieldEl = document.getElementById('field');
    const tbody = document.getElementById('tbody');
    const emptyState = document.getElementById('emptyState');
    const countText = document.getElementById('countText');
    const liveNote = document.getElementById('liveNote');
    const shownCount = document.getElementById('shownCount');
    const totalCount = document.getElementById('totalCount');
    const currentRound = document.getElementById('currentRound');
    const currentRoundSub = document.getElementById('currentRoundSub');
    const clockNow = document.getElementById('clockNow');
    const clockDate = document.getElementById('clockDate');
    const updatedAt = document.getElementById('updatedAt');
    const footerText = document.getElementById('footerText');
    const jumpBtn = document.getElementById('jumpBtn');
    const resetBtn = document.getElementById('resetBtn');

    const DAY_NAMES = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
    const MONTH_NAMES = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];

    function parseMatchDate(match) {
      return new Date(`${match.date}T${match.start}:00`);
    }
    function parseMatchEnd(match) {
      return new Date(`${match.date}T${match.end}:00`);
    }
    function pad(num) {
      return String(num).padStart(2, '0');
    }
    function formatClock(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function formatFullDate(d) {
      return `${DAY_NAMES[d.getDay()]} ${d.getDate()}. ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
    }

    const enriched = matches
      .map((m, i) => ({
        ...m,
        id: i + 1,
        startDate: parseMatchDate(m),
        endDate: parseMatchEnd(m),
        roundKey: `${m.date}|${m.start}`,
      }))
      .sort((a, b) => a.startDate - b.startDate || a.field.localeCompare(b.field, 'no'));

    function getLiveRoundInfo(now) {
      const futureRounds = [...new Set(
        enriched
          .filter(m => m.endDate >= now)
          .map(m => m.roundKey)
      )];
      const currentRoundKey = futureRounds[0] || null;

      return {
        currentRoundKey,
        liveNow: enriched.some(m => m.startDate <= now && m.endDate >= now),
      };
    }

    function getStatus(match, now, currentRoundKey) {
      if (match.endDate < now) {
        return { cls: 'done', label: 'Ferdigspilt' };
      }
      if (match.roundKey === currentRoundKey) {
        if (match.startDate <= now && match.endDate >= now) {
          return { cls: 'next', label: 'Spilles nå' };
        }
        return { cls: 'next', label: 'Neste runde' };
      }
      return { cls: 'coming', label: 'Kommende' };
    }

    function fillFilters() {
      const days = [...new Set(enriched.map(m => m.day))];
      const fields = [...new Set(enriched.map(m => m.field))];
      for (const day of days) {
        const opt = document.createElement('option');
        opt.value = day;
        opt.textContent = day;
        dayEl.appendChild(opt);
      }
      for (const field of fields) {
        const opt = document.createElement('option');
        opt.value = field;
        opt.textContent = field;
        fieldEl.appendChild(opt);
      }
    }

    function filteredMatches() {
      const q = searchEl.value.trim().toLowerCase();
      const day = dayEl.value;
      const field = fieldEl.value;

      return enriched.filter(m => {
        if (day && m.day !== day) return false;
        if (field && m.field !== field) return false;
        if (!q) return true;
        const hay = `${m.home} ${m.away} ${m.match} ${m.field} ${m.day}`.toLowerCase();
        return hay.includes(q);
      });
    }

    function updateHeader(now, visible, roundInfo) {
      clockNow.textContent = formatClock(now);
      clockDate.textContent = formatFullDate(now);
      updatedAt.textContent = formatClock(now);
      shownCount.textContent = visible.length;
      totalCount.textContent = `av ${enriched.length} kamper`;

      const roundMatches = visible.filter(m => m.roundKey === roundInfo.currentRoundKey);
      const uniqueRoundsVisible = [...new Set(visible.map(m => m.roundKey))];

      if (roundInfo.currentRoundKey && roundMatches.length) {
        const first = roundMatches[0];
        currentRound.textContent = `${first.dateLabel} kl. ${first.start}`;
        currentRoundSub.textContent = roundInfo.liveNow ? 'Kampene i denne runden spilles nå' : 'Dette er neste runde i visningen';
      } else if (roundInfo.currentRoundKey) {
        const fromAll = enriched.find(m => m.roundKey === roundInfo.currentRoundKey);
        currentRound.textContent = fromAll ? `${fromAll.dateLabel} kl. ${fromAll.start}` : '–';
        currentRoundSub.textContent = 'Aktuell runde finnes, men er filtrert bort';
      } else {
        currentRound.textContent = 'Ingen igjen';
        currentRoundSub.textContent = visible.length ? 'Alle viste kamper er ferdigspilt' : 'Ingen kamper i dette filteret';
      }

      countText.textContent = visible.length
        ? `Viser ${visible.length} kamper fordelt på ${uniqueRoundsVisible.length} runder.`
        : 'Ingen kamper å vise.';

      if (!visible.length) {
        liveNote.textContent = '';
      } else if (roundInfo.liveNow) {
        liveNote.textContent = 'Gul markering viser rundene som spilles akkurat nå.';
      } else {
        liveNote.textContent = 'Gul markering viser neste runde som kommer.';
      }


    }

    function render(scrollToFocus = false) {
      const now = new Date();
      const roundInfo = getLiveRoundInfo(now);
      const visible = filteredMatches();

      tbody.innerHTML = '';
      emptyState.hidden = visible.length !== 0;

      let focusRow = null;

      visible.forEach(match => {
        const status = getStatus(match, now, roundInfo.currentRoundKey);
        const tr = document.createElement('tr');
        tr.className = status.cls;
        tr.dataset.matchId = match.id;

        if (!focusRow && status.cls === 'next') {
          tr.classList.add('focus-target');
          focusRow = tr;
        }

        tr.innerHTML = `
          <td>${match.dateLabel}<div class="subtext">${match.day}</div></td>
          <td>${match.start}–${match.end}</td>
          <td>${match.field}</td>
          <td>
            <div class="match">${match.match}</div>
            <div class="subtext">${match.home} mot ${match.away}</div>
          </td>
          <td><span class="status">${status.label}</span></td>
        `;
        tbody.appendChild(tr);
      });

      updateHeader(now, visible, roundInfo);

      if (scrollToFocus) {
        setTimeout(() => {
          const target = focusRow || tbody.querySelector('tr:last-child');
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 60);
      }
    }

    fillFilters();
    render(true);

    [searchEl, dayEl, fieldEl].forEach(el => {
      el.addEventListener('input', () => render(false));
      el.addEventListener('change', () => render(false));
    });

    jumpBtn.addEventListener('click', () => render(true));
    resetBtn.addEventListener('click', () => {
      searchEl.value = '';
      dayEl.value = '';
      fieldEl.value = '';
      render(true);
    });

    setInterval(() => render(false), 30000);
  </script>
